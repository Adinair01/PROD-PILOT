# Render Blueprint for the PROD PILOT API (managed Node host).
# Deploy: push this repo, then in Render → "New +" → "Blueprint" → pick this repo.
# Render reads this file, provisions the service, and prompts for the `sync: false`
# secrets below. Docs: https://render.com/docs/blueprint-spec
#
# Frontend deploys separately to Vercel/Netlify (see vercel.json / netlify.toml).
services:
  - type: web
    name: prodpilot-api
    runtime: node
    plan: free # free tier sleeps after inactivity; upgrade for always-on
    region: oregon
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health # Render polls this for zero-downtime deploys
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Required for cross-site auth cookies (frontend on a different domain).
      # Maps to Secure + SameSite=None in the cookie config.
      - key: COOKIE_SECURE
        value: "true"
      - key: ACCESS_TOKEN_TTL
        value: 15m
      # Strong secret generated by Render — never committed, never printed.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      # Set these in the Render dashboard (marked secret, not stored in git):
      #   MONGO_URI    → your MongoDB Atlas SRV connection string
      #   CORS_ORIGIN  → exact frontend origin, e.g. https://prodpilot.vercel.app
      #   FRONTEND_URL → same frontend origin; used to build password-reset links
      #   HF_API_KEY / NVIDIA_API_KEY → optional; app degrades gracefully if unset
      #   RESEND_API_KEY / EMAIL_FROM → optional; unset = no password-reset emails sent
      #   SENTRY_DSN → optional; unset = no error monitoring
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SENTRY_DSN
        sync: false
